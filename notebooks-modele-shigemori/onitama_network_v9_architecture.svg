  <text x="340" y="68" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-size:12px;text-anchor:middle;dominant-baseline:central">batch × 5 × 5 × 10</text>
</g>

<line x1="340" y1="86" x2="340" y2="104" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px"/>

